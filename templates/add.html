<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add a Meal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('home') }}">🥗 NutriLogic</a>
    <div>
        <a href="{{ url_for('list_meals') }}">My Meals</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Add a Meal</h1>

    <form method="POST" class="meal-grid">

        <div>
            <label>Date</label>
            <input type="date" name="date" required>
        </div>

        <div>
            <label>Meal Type</label>
            <select name="mealType" required>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
            </select>
        </div>

        <div>
            <label>Meal Name</label>
            <input type="text" name="mealName" required>
        </div>

        <div>
            <label>Serving Size</label>
            <input type="text" name="serving_size">
        </div>

        <div>
            <label>Calories</label>
            <input type="number" name="calories">
        </div>

        <div>
            <label>Protein (g)</label>
            <input type="number" name="protein">
        </div>

        <div>
            <label>Carbohydrates (g)</label>
            <input type="number" name="carbs">
        </div>

        <div>
            <label>Fats (g)</label>
            <input type="number" name="fats">
        </div>

        <div class="full">
            <button type="submit">Save Meal</button>
        </div>

    </form>
</div>

</body>
</html>
