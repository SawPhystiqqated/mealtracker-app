<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add Meal Entry</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 24px auto; }
    label { display:block; margin-top:12px; font-weight:600; }
    input, textarea, select { width:100%; padding:8px; margin-top:6px; }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; }
    button { margin-top:16px; padding:10px 16px; }
    .note { color:#555; font-size:0.9em; }
    a { margin-left: 8px; }
  </style>
</head>
<body>
  <h1>Add Meal Entry</h1>

  <form method="POST" action="/add">
    <label for="date">Date (YYYY-MM-DD)</label>
    <input id="date" name="date" type="date" required />

    <label for="mealType">Meal Type</label>
    <select id="mealType" name="mealType" required>
      <option value="">-- choose --</option>
      <option value="breakfast">Breakfast</option>
      <option value="lunch">Lunch</option>
      <option value="dinner">Dinner</option>
      <option value="snack">Snack</option>
    </select>

    <label for="mealName">Meal Name</label>
    <input id="mealName" name="mealName" type="text" placeholder="Grilled Chicken Salad" required />

    <div class="row">
      <div>
        <label for="servingSize">Serving Size</label>
        <input id="servingSize" name="servingSize" type="text" placeholder="1 bowl / 200 g" required />
      </div>
      <div>
        <label for="calories">Calories (kcal)</label>
        <input id="calories" name="calories" type="number" step="0.1" min="0" placeholder="520" required />
      </div>
    </div>

    <label for="dietaryFlags">Dietary Flags (optional, comma-separated)</label>
    <input id="dietaryFlags" name="dietaryFlags" type="text" placeholder="vegan, halal, vegetarian" />

    <label for="notes">Notes (optional)</label>
    <textarea id="notes" name="notes" rows="3" placeholder="Light dressing only"></textarea>

    <p class="note">On submit, the entry will be saved to <code>data.json</code> and you will be redirected.</p>

    <button type="submit">Save Meal</button>
    <a href="/list">View All Meals</a>
  </form>
</body>
</html>
