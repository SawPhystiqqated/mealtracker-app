<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add a Meal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="navbar">
    {{ url_for('home') }}🥗 NutriLogic</a>
    <div>
        <a href="{{ url_for('list_meals') }}">My Meals</a>
        <a href="{{ url_for('add_meal') }}">Add Meal</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Add a Meal</h1>

    <form method="POST" action="{{ url_for('add_meal') }}">
        <label for="name">Meal Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="calories">Calories:</label>
        <input type="number" id="calories" name="calories" required>

        <label for="protein">Protein (g):</label>
        <input type="number" id="protein" name="protein" required>

        <label for="carbs">Carbohydrates (g):</label>
        <input type="number" id="carbs" name="carbs" required>

        <label for="fats">Fats (g):</label>
        <input type="number" id="fats" name="fats" required>

        <button type="submit">Add Meal</button>
    </form>
</div>

</body>
</html>
