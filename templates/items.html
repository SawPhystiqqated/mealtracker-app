<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>NutriLogic | My Meals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="navbar">
    <div class="brand">🥗 NutriLogic</div>
    <div>
        <a href="{{ url_for('add_meal') }}">Add Meal</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">

<h1>Your Meals</h1>

{% if meal_count == 0 %}
    <p>You don’t have any meals yet.</p>
    <a class="btn" href="{{ url_for('add_meal') }}">Create Your First Meal</a>
{% else %}
    {% for meal in meals %}
        <div class="meal-card">
            <strong>{{ meal.date }}</strong><br>
            {{ meal.mealType|title }} — {{ meal.mealName }}

            <div class="meal-actions">
                <a href="{{ url_for('edit_meal', meal_id=meal.id) }}">Edit</a>
                <a href="{{ url_for('delete_meal', meal_id=meal.id) }}"
                   onclick="return confirm('Delete this meal?');">
                   Delete
                </a>
            </div>
        </div>
    {% endfor %}
{% endif %}

</div>

</body>
</html>
``
