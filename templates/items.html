<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Meals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="navbar">
    <a class="brand" href="{{ url_for('home') }}">🥗 NutriLogic</a>
    <div>
        <a href="{{ url_for('add_meal') }}">Add Meal</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Your Meals</h1>

    {% if meals|length == 0 %}
        <p>No meals yet.</p>
    {% else %}
        {% for meal in meals %}
            <div class="meal-card">
                <strong>{{ meal.date }}</strong><br>
                {{ meal.meal_type|title }} — {{ meal.meal_name }}
            </div>
        {% endfor %}
    {% endif %}
</div>

</body>
</html>
