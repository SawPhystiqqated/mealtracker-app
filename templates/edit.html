<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Meal</title>
</head>
<body>

<h1>Edit Meal</h1>

<form method="POST">
    <label>Date:</label><br>
    <input type="date" name="date" value="{{ meal.date }}"><br><br>

    <label>Meal Type:</label><br>
    <input name="mealType" value="{{ meal.mealType }}"><br><br>

    <label>Meal Name:</label><br>
    <input name="mealName" value="{{ meal.mealName }}"><br><br>

    <label>Serving Size:</label><br>
    <input name="servingSize" value="{{ meal.servingSize }}"><br><br>

    <label>Calories:</label><br>
    <input type="number" step="0.1" name="calories" value="{{ meal.calories }}"><br><br>

    <label>Dietary Flags:</label><br>
    <input name="dietaryFlags" value="{{ meal.dietaryFlags }}"><br><br>

    <label>Notes:</label><br>
    <textarea name="notes">{{ meal.notes }}</textarea><br><br>

<button type="submit">Save Changes</button>

<a href="{{ url_for('list_meals') }}">Cancel</a>

</form>

<a href="{{ url_for('list_meals') }}">Back to list</a>

</body>
</html>
