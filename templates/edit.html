<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>NutriLogic | Edit Meal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="navbar">
    <div class="brand">🥗 NutriLogic</div>
    <div>
        <a href="{{ url_for('list_meals') }}">My Meals</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">

    <h1>Edit Meal</h1>

    <form method="POST">
        <label>Date</label>
        <input type="date" name="date" value="{{ meal.date }}" required>

        <label>Meal Type</label>
        <input type="text" name="mealType" value="{{ meal.mealType }}" required>

        <label>Meal Name</label>
        <input type="text" name="mealName" value="{{ meal.mealName }}" required>

        <button type="submit">Save Changes</button>
        <a class="btn-secondary" href="{{ url_for('list_meals') }}">Cancel</a>
    </form>

</div>

</body>
</html>
